---
apiVersion: v1
kind: Pod
metadata:
  name: internal-app
  namespace: default
  labels:
    app: internal-app
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "while true; do echo 'internal service' | nc -l -p 8080; done"]
      ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: internal-svc
  namespace: default
spec:
  selector:
    app: internal-app
  type: NodePort
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
