---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: superadmin
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: superadmin-cluster-admin
subjects:
  - kind: ServiceAccount
    name: superadmin
    namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
